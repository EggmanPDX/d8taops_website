<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 290">
  <rect width="920" height="290" fill="#f0f4f8"/>

  <!-- Source: Vendor Invoices -->
  <rect x="20" y="91" width="130" height="48" rx="8" fill="rgba(8,31,92,0.06)" stroke="rgba(8,31,92,0.28)" stroke-width="1.5"/>
  <text x="85" y="118" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" fill="#081F5C">Vendor Invoices</text>

  <!-- Source: Insertion Orders -->
  <rect x="20" y="157" width="130" height="48" rx="8" fill="rgba(8,31,92,0.06)" stroke="rgba(8,31,92,0.28)" stroke-width="1.5"/>
  <text x="85" y="184" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" fill="#081F5C">Insertion Orders</text>

  <!-- Merge lines from sources to D8:INGEST -->
  <path d="M150,115 Q164,115 172,140" stroke="rgba(4,119,191,0.55)" stroke-width="1.5" fill="none"/>
  <path d="M150,181 Q164,181 172,140" stroke="rgba(4,119,191,0.55)" stroke-width="1.5" fill="none"/>
  <line x1="172" y1="140" x2="182" y2="140" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="180,136 188,140 180,144" fill="rgba(4,119,191,0.6)"/>

  <!-- D8:INGEST -->
  <rect x="190" y="108" width="115" height="64" rx="10" fill="white" stroke="rgba(4,119,191,0.35)" stroke-width="1.5"/>
  <text x="247" y="133" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="700" fill="#081F5C">D8:INGEST</text>
  <text x="247" y="151" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#0477BF">Connect</text>

  <!-- Arrow D8:INGEST → D8:CAT -->
  <line x1="305" y1="140" x2="316" y2="140" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="314,136 322,140 314,144" fill="rgba(4,119,191,0.6)"/>

  <!-- D8:CAT -->
  <rect x="324" y="108" width="115" height="64" rx="10" fill="white" stroke="rgba(4,119,191,0.35)" stroke-width="1.5"/>
  <text x="381" y="133" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="700" fill="#081F5C">D8:CAT</text>
  <text x="381" y="151" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#0477BF">Catalog</text>
  <!-- Tag icon bottom-right corner -->
  <path d="M424,162 L433,162 L433,169 L428.5,174 L424,169 Z" fill="rgba(4,119,191,0.4)"/>
  <circle cx="427.5" cy="165.5" r="1.5" fill="white"/>

  <!-- Arrow D8:CAT → D8:CURATE -->
  <line x1="439" y1="140" x2="450" y2="140" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="448,136 456,140 448,144" fill="rgba(4,119,191,0.6)"/>

  <!-- D8:CURATE (taller for annotation) -->
  <rect x="458" y="100" width="138" height="80" rx="10" fill="white" stroke="rgba(4,119,191,0.35)" stroke-width="1.5"/>
  <text x="527" y="126" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="700" fill="#081F5C">D8:CURATE</text>
  <text x="527" y="144" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#0477BF">Clean / Validate</text>
  <text x="527" y="162" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="9" font-style="italic" fill="rgba(51,51,51,0.5)">actuals vs. approved orders</text>

  <!-- Arrow D8:CURATE → D8:FLOW -->
  <line x1="596" y1="140" x2="607" y2="140" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="605,136 613,140 605,144" fill="rgba(4,119,191,0.6)"/>

  <!-- D8:FLOW -->
  <rect x="615" y="108" width="115" height="64" rx="10" fill="white" stroke="rgba(4,119,191,0.35)" stroke-width="1.5"/>
  <text x="672" y="133" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="700" fill="#081F5C">D8:FLOW</text>
  <text x="672" y="151" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#0477BF">Orchestrate</text>

  <!-- Arrow D8:FLOW → Output -->
  <line x1="730" y1="140" x2="741" y2="140" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="739,136 747,140 739,144" fill="rgba(4,119,191,0.6)"/>

  <!-- Output node -->
  <rect x="749" y="100" width="155" height="80" rx="8" fill="white" stroke="#3ecf8e" stroke-width="2"/>
  <text x="826" y="133" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="700" fill="#081F5C">Finance-Ready Report</text>
  <text x="826" y="153" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="rgba(51,51,51,0.5)">Campaign Alert</text>

  <!-- Dashed exception arrow from D8:FLOW bottom -->
  <line x1="672" y1="172" x2="672" y2="208" stroke="rgba(4,119,191,0.55)" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="668,206 672,216 676,206" fill="rgba(4,119,191,0.55)"/>

  <!-- Discrepancy Flagged -->
  <rect x="594" y="218" width="156" height="52" rx="8" fill="rgba(255,107,107,0.15)" stroke="rgba(255,107,107,0.55)" stroke-width="1"/>
  <text x="672" y="249" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="700" fill="#081F5C">Discrepancy Flagged</text>
</svg>
