<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300">
  <rect width="920" height="300" fill="#f0f4f8"/>

  <!-- Source: Core Banking -->
  <rect x="20" y="71" width="130" height="48" rx="8" fill="rgba(8,31,92,0.06)" stroke="rgba(8,31,92,0.28)" stroke-width="1.5"/>
  <text x="85" y="99" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" fill="#081F5C">Core Banking</text>

  <!-- Source: ERP / GL -->
  <rect x="20" y="131" width="130" height="48" rx="8" fill="rgba(8,31,92,0.06)" stroke="rgba(8,31,92,0.28)" stroke-width="1.5"/>
  <text x="85" y="159" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" fill="#081F5C">ERP / GL</text>

  <!-- Source: Data Warehouse -->
  <rect x="20" y="191" width="130" height="48" rx="8" fill="rgba(8,31,92,0.06)" stroke="rgba(8,31,92,0.28)" stroke-width="1.5"/>
  <text x="85" y="219" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" fill="#081F5C">Data Warehouse</text>

  <!-- Merge lines from 3 sources to single arrow -->
  <path d="M150,95 Q164,95 172,155" stroke="rgba(4,119,191,0.55)" stroke-width="1.5" fill="none"/>
  <line x1="150" y1="155" x2="172" y2="155" stroke="rgba(4,119,191,0.55)" stroke-width="1.5"/>
  <path d="M150,215 Q164,215 172,155" stroke="rgba(4,119,191,0.55)" stroke-width="1.5" fill="none"/>
  <line x1="172" y1="155" x2="182" y2="155" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="180,151 188,155 180,159" fill="rgba(4,119,191,0.6)"/>

  <!-- D8:INGEST -->
  <rect x="190" y="123" width="115" height="64" rx="10" fill="white" stroke="rgba(4,119,191,0.35)" stroke-width="1.5"/>
  <text x="247" y="148" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="700" fill="#081F5C">D8:INGEST</text>
  <text x="247" y="166" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#0477BF">Connect</text>

  <!-- Arrow D8:INGEST → D8:CURATE -->
  <line x1="305" y1="155" x2="316" y2="155" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="314,151 322,155 314,159" fill="rgba(4,119,191,0.6)"/>

  <!-- D8:CURATE -->
  <rect x="324" y="123" width="115" height="64" rx="10" fill="white" stroke="rgba(4,119,191,0.35)" stroke-width="1.5"/>
  <text x="381" y="148" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="700" fill="#081F5C">D8:CURATE</text>
  <text x="381" y="166" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#0477BF">Clean / Validate</text>

  <!-- Arrow D8:CURATE → D8:FLOW -->
  <line x1="439" y1="155" x2="450" y2="155" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="448,151 456,155 448,159" fill="rgba(4,119,191,0.6)"/>

  <!-- D8:FLOW -->
  <rect x="458" y="123" width="115" height="64" rx="10" fill="white" stroke="rgba(4,119,191,0.35)" stroke-width="1.5"/>
  <text x="515" y="148" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="700" fill="#081F5C">D8:FLOW</text>
  <text x="515" y="166" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#0477BF">Orchestrate</text>

  <!-- Arrow D8:FLOW → D8:OBSERVE -->
  <line x1="573" y1="155" x2="584" y2="155" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="582,151 590,155 582,159" fill="rgba(4,119,191,0.6)"/>

  <!-- D8:OBSERVE -->
  <rect x="592" y="123" width="115" height="64" rx="10" fill="white" stroke="rgba(4,119,191,0.35)" stroke-width="1.5"/>
  <text x="649" y="148" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="700" fill="#081F5C">D8:OBSERVE</text>
  <text x="649" y="166" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#0477BF">Monitor + Log</text>
  <!-- Audit log icon: 3 horizontal lines, bottom-right corner -->
  <line x1="692" y1="176" x2="703" y2="176" stroke="rgba(4,119,191,0.4)" stroke-width="1.5"/>
  <line x1="692" y1="180" x2="703" y2="180" stroke="rgba(4,119,191,0.4)" stroke-width="1.5"/>
  <line x1="692" y1="184" x2="703" y2="184" stroke="rgba(4,119,191,0.4)" stroke-width="1.5"/>

  <!-- Arrow D8:OBSERVE → Output -->
  <line x1="707" y1="155" x2="718" y2="155" stroke="rgba(4,119,191,0.6)" stroke-width="1.5"/>
  <polygon points="716,151 724,155 716,159" fill="rgba(4,119,191,0.6)"/>

  <!-- Output node -->
  <rect x="726" y="115" width="160" height="80" rx="8" fill="white" stroke="#3ecf8e" stroke-width="2"/>
  <text x="806" y="147" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="700" fill="#081F5C">GL Match Report</text>
  <text x="806" y="165" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="700" fill="#081F5C">+ NCUA Filing</text>

  <!-- Dashed exception arrow from D8:FLOW bottom -->
  <line x1="515" y1="187" x2="515" y2="225" stroke="rgba(4,119,191,0.55)" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="511,223 515,233 519,223" fill="rgba(4,119,191,0.55)"/>

  <!-- Controller Review -->
  <rect x="435" y="235" width="160" height="52" rx="8" fill="rgba(255,107,107,0.15)" stroke="rgba(255,107,107,0.55)" stroke-width="1"/>
  <text x="515" y="266" text-anchor="middle" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="700" fill="#081F5C">Controller Review</text>
</svg>
